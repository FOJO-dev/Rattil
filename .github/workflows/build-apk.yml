)
@echo off
echo ============================================
echo    Quran App - APK Builder
echo ============================================
echo.

:: Check if Flutter is installed
where flutter >nul 2>&1
if %ERRORLEVEL% NEQ 0 (
    echo [ERROR] Flutter is not installed!
    echo.
    echo Please install Flutter first:
    echo 1. Download from: https://docs.flutter.dev/get-started/install/windows
    echo 2. Extract to C:\src\flutter
    echo 3. Add C:\src\flutter\bin to your PATH
    echo 4. Run this script again
    echo.
    pause
    exit /b 1
)

echo [1/4] Checking Flutter installation...
flutter --version
if %ERRORLEVEL% NEQ 0 (
    echo [ERROR] Flutter not working correctly
    pause
    exit /b 1
)

echo.
echo [2/4] Installing dependencies...
call flutter pub get
if %ERRORLEVEL% NEQ 0 (
    echo [ERROR] Failed to install dependencies
    pause
    exit /b 1
)

echo.
echo [3/4] Building APK...
call flutter build apk --release
if %ERRORLEVEL% NEQ 0 (
    echo [ERROR] Build failed
    pause
    exit /b 1

echo.
echo [4/4] Build successful!
echo.
echo APK location: build\app\outputs\flutter-apk\app-release.apk
echo.
pause
